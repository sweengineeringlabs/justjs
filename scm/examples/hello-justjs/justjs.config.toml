[app]
name = "hello-justjs"
version = "0.1.0"

# DDAS enforcement: optional (only for test scenarios)
# Set enabled=false to skip DDAS validation (production mode)
# Set onMissing="warn" to log warnings instead of errors
[ddas]
enabled = true
onMissing = "error"  # "error" | "warn" | "ignore"

[security]
strategy = "noop"

[observability]
strategy = "console"

[i18n]
strategy = "noop"

[flags]
strategy = "noop"

[analytics]
strategy = "noop"

[theming]
strategy = "light"

[routes]
"/counter" = "counter"
"/fetch" = "fetch-demo"

[components]
"x-counter" = "counter"
"x-fetch" = "fetch-demo"

[registry]
domAddressMap = {
  "x-counter" = "#app",
  "x-fetch" = "#app"
}
