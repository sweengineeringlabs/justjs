[app]
name = "hello-justjs"
version = "0.1.0"

# DDAS enforcement: optional (only for test scenarios)
# Set enabled=false to skip DDAS validation (production mode)
# Set onMissing="warn" to log warnings instead of errors
[ddas]
enabled = true
onMissing = "error"  # "error" | "warn" | "ignore"

[security]
strategy = "noop"

# Only "noop" strategies are self-registered by the aop/* workspaces today
# (see aop/*/scm/main/src/spi/index.ts) - "console"/"light" etc. do not exist
# as importable strategy packages yet, so this demo can only request "noop".
[observability]
strategy = "noop"

[i18n]
strategy = "noop"

[flags]
strategy = "noop"

[analytics]
strategy = "noop"

[theming]
strategy = "noop"

[routes]
"/counter" = "counter"
"/fetch" = "fetch-demo"
"/form" = "form-demo"

[components]
"x-counter" = "counter"
"x-fetch" = "fetch-demo"
"x-form" = "form-demo"

[registry]
domAddressMap = {
  "x-counter" = "#app",
  "x-fetch" = "#app",
  "x-form" = "#app"
}
