<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agentic-memory-demo</title>
  <link rel="stylesheet" href="/src/app.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark">🧠</div>
        <div class="brand-text">
          <h1>Memory Assistant</h1>
          <p class="brand-subtitle">Remembers what matters</p>
        </div>
        <button id="settings-btn" type="button" aria-label="Settings">⚙️</button>
        <button id="theme-toggle-btn" type="button" aria-label="Toggle light/dark theme"></button>
      </div>
    </header>
    <main class="page-container">
      <div id="mount-chat" class="page active" data-ddas-id="agentic-memory-demo:home:x-chat:root"></div>
      <div id="mount-dashboard" class="page" data-ddas-id="agentic-memory-demo:home:x-dashboard:root"></div>
      <div id="mount-curation" class="page" data-ddas-id="agentic-memory-demo:home:x-curation:root"></div>
    </main>
    <nav class="nav">
      <button class="nav-btn active" data-route="/chat"><span class="nav-icon">💬</span><span class="nav-label">Chat</span></button>
      <button class="nav-btn" data-route="/dashboard"><span class="nav-icon">🗂️</span><span class="nav-label">Memories</span></button>
      <button class="nav-btn" data-route="/curation"><span class="nav-icon">🧠</span><span class="nav-label">Curate</span></button>
    </nav>
    <div id="settings-panel" class="settings-panel" hidden>
      <div id="settings-backdrop" class="settings-backdrop"></div>
      <div class="settings-sheet">
        <div class="settings-sheet-header">
          <h2 id="settings-sheet-title">Settings</h2>
          <button id="settings-close-btn" type="button" aria-label="Close settings">✕</button>
        </div>
        <div id="settings-main">
          <div class="field">
            <span class="field-label">Voice input language</span>
            <button id="settings-lang-field" type="button" class="picker-field">
              <span id="settings-lang-value">Auto</span>
              <span class="picker-chevron">›</span>
            </button>
          </div>
          <label id="settings-tts-row" class="settings-toggle-row" hidden>
            <input id="settings-tts-toggle" type="checkbox" />
            <span>Read assistant replies aloud</span>
          </label>
        </div>
        <div id="settings-lang-picker" class="lang-picker" hidden>
          <button id="lang-picker-back-btn" type="button" class="dash-back-btn">← Settings</button>
          <div id="lang-picker-list" class="lang-picker-list"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/app.ts"></script>
</body>
</html>
