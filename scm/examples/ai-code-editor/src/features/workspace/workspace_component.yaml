name: workspace
version: 1
# ── Styles ────────────────────────────────────────────────────────
# justjs#96: real csslens-generated BEM CSS for the 2 elements with
# their own dedicated, statically-addressable styling (back-btn,
# stage-title). Reproduces the exact property values app.css's
# hand-written .dash-back-btn/.workspace-stage-title rules already had
# - a like-for-like swap, not a redesign. The [data-stage="..."]
# --stage-color cascade (set on #workspace-view directly by
# workspace.ts's renderStage()) still cascades down to function-list's
# tiles via inheritance (GridView's own --stage-color custom property).
#
# function-list itself (justjs#132 follow-up: "Workspace option must
# remain grid widgets, even after drill in" - direct user request) is
# now a <view-grid> instead of a plain div - same shared component the
# overview grid already uses, fully self-styled inside its own Shadow
# DOM (@justjs/component-view, ADR-0014). No parts entry needed here,
# same as overview-grid above - a light-DOM part style can't reach
# inside a Shadow DOM anyway.
styles:
  parts:
    back-btn:
      base:
        properties:
          flex: "0 0 auto"
          padding: "8px 14px"
          font-size: "13px"
          background: "color-mix(in srgb, var(--stage-color, var(--accent)) 16%, var(--surface-alt))"
          color: "var(--text)"
    stage-title:
      base:
        properties:
          margin: "0"
          font-size: "16px"
          padding-left: "10px"
          border-left: "3px solid var(--stage-color, var(--accent))"
dom:
  tag: x-workspace
  builtinStates: false
  # No customElement.tagName override - see justjs#113's shared note
  # (WorkspaceBase self-registers under its harmless default
  # js-workspace; WorkspaceElement keeps its own explicit x-workspace
  # registration).
  #
  # Unlike editor/chat/review/scaffold (a mostly-static layout with
  # dynamically-updated content in fixed slots), WorkspaceElement's own
  # content genuinely changes shape depending on navigation state
  # (overview grid vs. a specific stage's N functions vs. one of 6
  # extracted sub-screens - justjs#119/#122-#126). Only what's truly
  # static across every navigation state is declared here: the root
  # wrapper, the overview grid (persistent, re-populated via .items on
  # each visit rather than torn down and rebuilt), the generic
  # function-list shell (back button + title + a second <view-grid>,
  # re-populated via .items per stage the same way the overview grid
  # is - justjs#132 follow-up), and the sub-screen mount point (where
  # the 6 extracted controls attach/detach). All three top-level
  # sections are permanent siblings toggled via `hidden`, not recreated
  # per navigation - matching every extracted control's own
  # cached-instance persistence.
  elements:
    workspace-view:
      tag: div
      address: true
    overview-grid:
      tag: view-grid
      address: true
    function-list-view:
      tag: div
      address: true
    back-btn:
      tag: button
      address: true
    stage-title:
      tag: h2
      address: true
    function-list:
      tag: view-grid
      address: true
    subscreen-view:
      tag: div
      address: true
