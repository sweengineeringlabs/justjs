<x-chat class="chat">
  <div class="chat__agent-confirm" data-part="agent-confirm" data-ddas-id="ai-code-editor:chat:chat:agent-confirm"></div>
  <p class="chat__agent-confirm-message" data-part="agent-confirm-message" data-ddas-id="ai-code-editor:chat:chat:agent-confirm-message"></p>
  <div class="chat__agent-messages" data-part="agent-messages" data-ddas-id="ai-code-editor:chat:chat:agent-messages"></div>
  <button class="chat__agent-stop-btn" data-part="agent-stop-btn" data-ddas-id="ai-code-editor:chat:chat:agent-stop-btn"></button>
  <p class="chat__context-label" data-part="context-label" data-ddas-id="ai-code-editor:chat:chat:context-label"></p>
  <p class="chat__image-error" data-part="image-error" data-ddas-id="ai-code-editor:chat:chat:image-error"></p>

  <div class="chat__messages" data-part="messages" data-ddas-id="ai-code-editor:chat:chat:messages"></div>
  <view-toggle class="chat__mode-toggle" data-part="mode-toggle" data-ddas-id="ai-code-editor:chat:chat:mode-toggle"></view-toggle>
