<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ai-code-editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/src/app.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="10" r="2.2"/><circle cx="10" cy="3" r="1.6"/><circle cx="17" cy="10" r="1.6"/><circle cx="10" cy="17" r="1.6"/><circle cx="3" cy="10" r="1.6"/><path d="M10 5.2V7.8M12.2 10H14.8M10 12.2V14.8M5.2 10H7.8"/></svg></div>
        <div class="brand-text">
          <h1>Workplace</h1>
          <p class="brand-subtitle">Work on the go<svg class="brand-subtitle-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.5 7h2.3M2.5 9.6h1.7" opacity="0.55"/><circle cx="10.5" cy="3.8" r="1.4"/><path d="M10.5 6.5l2.6-1.3M10.5 6.5l-2 2.1M10.5 6.5v2.3M10.5 8.8l2.6 1.4-.5 3.3M10.5 8.8l-2.9 3-1 3.3"/></svg></p>
        </div>
        <button id="settings-btn" type="button" aria-label="Settings"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="10" r="2.5"/><path d="M10 2.5v2M10 15.5v2M17.5 10h-2M4.5 10h-2M15.4 4.6l-1.4 1.4M6 12.6l-1.4 1.4M15.4 15.4l-1.4-1.4M6 7.4 4.6 6"/></svg></button>
        <button id="theme-toggle-btn" type="button" aria-label="Toggle light/dark theme">
          <span class="icon-sun" aria-hidden="true" hidden><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="10" cy="10" r="3.5" fill="currentColor" stroke="none"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="10" y1="16" x2="10" y2="18"/><line x1="2" y1="10" x2="4" y2="10"/><line x1="16" y1="10" x2="18" y2="10"/><line x1="4.5" y1="4.5" x2="5.9" y2="5.9"/><line x1="14.1" y1="14.1" x2="15.5" y2="15.5"/><line x1="4.5" y1="15.5" x2="5.9" y2="14.1"/><line x1="14.1" y1="5.9" x2="15.5" y2="4.5"/></svg></span>
          <span class="icon-moon" aria-hidden="true"><svg viewBox="0 0 20 20" fill="currentColor" stroke="none"><path d="M15.5 12.3A7 7 0 0 1 7.7 4.5a7 7 0 1 0 7.8 7.8Z"/></svg></span>
        </button>
      </div>
    </header>
    <main class="page-container">
      <!-- data-ddas-id is stamped at runtime by stampMounts() (src/mounts.gen.ts,
           justweb.toml's [mounts]) - not hand-authored here, see justjs#95. -->
      <div id="mount-home" class="page active"></div>
      <div id="mount-editor" class="page"></div>
      <div id="mount-chat" class="page"></div>
      <div id="mount-review" class="page"></div>
      <div id="mount-scaffold" class="page"></div>
      <div id="mount-connect" class="page"></div>
    </main>
    <!-- Grouped develop/connect clusters, not one flat run of tabs -
         Editor/Chat/Review/Scaffold are the actual AI-pair-programming
         loop (Editor/Review/Scaffold reached inline via Home's own SDLC
         hub, not standalone tabs); Connect showcases third-party
         provider connectors (Comms/Socials/Cartoon, each reached via
         Connect's own widget grid, not standalone tabs). Workspace is no
         longer a tab at all - its content lives inline on Home. -->
    <nav class="nav">
      <div class="nav-group" data-group="home">
        <button class="nav-btn active" data-route="/home"><span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9.5 10 3l7 6.5"/><path d="M5 8v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V8"/><path d="M8 17v-5h4v5"/></svg></span><span class="nav-label">Home</span></button>
      </div>
      <div class="nav-divider" aria-hidden="true"></div>
      <!-- Editor/Review/Scaffold are no longer standalone tabs (direct
           user request) - they're reachable via Home's own SDLC hub ->
           Development's function list instead. Chat is the only tool
           left in this group. -->
      <div class="nav-group" data-group="develop">
        <button class="nav-btn" data-route="/chat"><span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 4.5h14a1 1 0 0 1 1 1V13a1 1 0 0 1-1 1H8l-4 3v-3H3a1 1 0 0 1-1-1V5.5a1 1 0 0 1 1-1Z"/></svg></span><span class="nav-label">Chat</span></button>
      </div>
      <div class="nav-divider" aria-hidden="true"></div>
      <!-- Communication/Socials/Cartoon are no longer standalone tabs
           (direct user request) - they're reachable via Connect's own
           widget grid instead. -->
      <div class="nav-group" data-group="connect">
        <button class="nav-btn" data-route="/connect"><span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="10" r="7.5"/><line x1="2.5" y1="10" x2="17.5" y2="10"/><path d="M10 2.5c2.2 2 3.4 4.7 3.4 7.5s-1.2 5.5-3.4 7.5c-2.2-2-3.4-4.7-3.4-7.5S7.8 4.5 10 2.5Z"/></svg></span><span class="nav-label">Connect</span></button>
      </div>
    </nav>
    <div id="settings-panel" class="settings-panel" hidden>
      <div id="settings-backdrop" class="settings-backdrop"></div>
      <div class="settings-sheet">
        <div class="settings-sheet-header">
          <h2>Settings</h2>
          <button id="settings-close-btn" type="button" aria-label="Close settings">✕</button>
        </div>
        <div class="settings-section">
          <h3>Theme</h3>
          <select id="settings-theme-select"></select>
        </div>
        <div class="settings-section">
          <h3>Anthropic API key</h3>
          <p class="settings-disclosure">Stored only on this device. Sent directly to Anthropic when you use AI features.</p>
          <input id="settings-api-key" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />
          <div class="settings-api-key-actions">
            <button id="settings-api-key-save" type="button" class="btn-primary">Save</button>
            <button id="settings-api-key-clear" type="button" class="btn-secondary">Clear</button>
          </div>
          <p id="settings-api-key-status" class="settings-api-key-status"></p>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/app.ts"></script>
</body>
</html>
