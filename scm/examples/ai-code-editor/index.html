<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ai-code-editor</title>
  <link rel="stylesheet" href="/src/app.css" />
  <!-- justjs#96: real csslens-generated BEM CSS for x-workspace's back-btn/
       stage-title/function-list parts, replacing the equivalent hand-written
       rules removed from app.css - see workspace_component.yaml's styles: layer. -->
  <link rel="stylesheet" href="/src/features/workspace/workspace_component.gen.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="7 5 2 10 7 15"/><polyline points="13 5 18 10 13 15"/></svg></div>
        <div class="brand-text">
          <h1>AI Code Editor</h1>
          <p class="brand-subtitle">Assisted by Claude</p>
        </div>
        <button id="settings-btn" type="button" aria-label="Settings"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="10" r="2.5"/><path d="M10 2.5v2M10 15.5v2M17.5 10h-2M4.5 10h-2M15.4 4.6l-1.4 1.4M6 12.6l-1.4 1.4M15.4 15.4l-1.4-1.4M6 7.4 4.6 6"/></svg></button>
        <button id="theme-toggle-btn" type="button" aria-label="Toggle light/dark theme">
          <span class="icon-sun" aria-hidden="true" hidden><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="10" cy="10" r="3.5" fill="currentColor" stroke="none"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="10" y1="16" x2="10" y2="18"/><line x1="2" y1="10" x2="4" y2="10"/><line x1="16" y1="10" x2="18" y2="10"/><line x1="4.5" y1="4.5" x2="5.9" y2="5.9"/><line x1="14.1" y1="14.1" x2="15.5" y2="15.5"/><line x1="4.5" y1="15.5" x2="5.9" y2="14.1"/><line x1="14.1" y1="5.9" x2="15.5" y2="4.5"/></svg></span>
          <span class="icon-moon" aria-hidden="true"><svg viewBox="0 0 20 20" fill="currentColor" stroke="none"><path d="M15.5 12.3A7 7 0 0 1 7.7 4.5a7 7 0 1 0 7.8 7.8Z"/></svg></span>
        </button>
      </div>
    </header>
    <main class="page-container">
      <!-- data-ddas-id is stamped at runtime by stampMounts() (src/mounts.gen.ts,
           justweb.toml's [mounts]) - not hand-authored here, see justjs#95. -->
      <div id="mount-editor" class="page active"></div>
      <div id="mount-chat" class="page"></div>
      <div id="mount-review" class="page"></div>
      <div id="mount-scaffold" class="page"></div>
      <div id="mount-workspace" class="page"></div>
      <div id="mount-communication" class="page"></div>
      <div id="mount-socials" class="page"></div>
      <div id="mount-cartoon" class="page"></div>
    </main>
    <!-- Grouped develop/workspace/connect clusters, not one flat run of 8
         equally-weighted tabs - Editor/Chat/Review/Scaffold are the actual
         AI-pair-programming loop, Workspace is its own SDLC-stage hub, and
         Comms/Socials/Cartoon showcase third-party provider connectors. -->
    <nav class="nav">
      <div class="nav-group" data-group="develop">
        <button class="nav-btn active" data-route="/editor"><span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="7 5 2 10 7 15"/><polyline points="13 5 18 10 13 15"/></svg></span><span class="nav-label">Editor</span></button>
        <button class="nav-btn" data-route="/chat"><span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 4.5h14a1 1 0 0 1 1 1V13a1 1 0 0 1-1 1H8l-4 3v-3H3a1 1 0 0 1-1-1V5.5a1 1 0 0 1 1-1Z"/></svg></span><span class="nav-label">Chat</span></button>
        <button class="nav-btn" data-route="/review"><span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="17" y1="17" x2="13" y2="13"/></svg></span><span class="nav-label">Review</span></button>
        <button class="nav-btn" data-route="/scaffold"><span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 2.5h6l4 4V17a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1Z"/><line x1="10" y1="9.5" x2="10" y2="14.5"/><line x1="7.5" y1="12" x2="12.5" y2="12"/></svg></span><span class="nav-label">Scaffold</span></button>
      </div>
      <div class="nav-divider" aria-hidden="true"></div>
      <div class="nav-group" data-group="workspace">
        <button class="nav-btn" data-route="/workspace"><span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="2.5" width="6" height="6" rx="1"/><rect x="11.5" y="2.5" width="6" height="6" rx="1"/><rect x="2.5" y="11.5" width="6" height="6" rx="1"/><rect x="11.5" y="11.5" width="6" height="6" rx="1"/></svg></span><span class="nav-label">Workspace</span></button>
      </div>
      <div class="nav-divider" aria-hidden="true"></div>
      <div class="nav-group" data-group="connect">
        <button class="nav-btn" data-route="/communication"><span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.5 4.5h9a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H8l-2.5 2v-2H2.5a1 1 0 0 1-1-1v-5a1 1 0 0 1 1-1Z"/><path d="M13 7.5h4.5a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1H17v1.7L15 13.5"/></svg></span><span class="nav-label">Comms</span></button>
        <button class="nav-btn" data-route="/socials"><span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="10" r="7.5"/><line x1="2.5" y1="10" x2="17.5" y2="10"/><path d="M10 2.5c2.2 2 3.4 4.7 3.4 7.5s-1.2 5.5-3.4 7.5c-2.2-2-3.4-4.7-3.4-7.5S7.8 4.5 10 2.5Z"/></svg></span><span class="nav-label">Socials</span></button>
        <button class="nav-btn" data-route="/cartoon"><span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="3.5" width="15" height="13" rx="1.5"/><circle cx="7" cy="8" r="1.5"/><path d="M17.5 13.5 13 9l-8 8"/></svg></span><span class="nav-label">Cartoon</span></button>
      </div>
    </nav>
    <div id="settings-panel" class="settings-panel" hidden>
      <div id="settings-backdrop" class="settings-backdrop"></div>
      <div class="settings-sheet">
        <div class="settings-sheet-header">
          <h2>Settings</h2>
          <button id="settings-close-btn" type="button" aria-label="Close settings">✕</button>
        </div>
        <div class="settings-section">
          <h3>Theme</h3>
          <select id="settings-theme-select"></select>
        </div>
        <div class="settings-section">
          <h3>Anthropic API key</h3>
          <p class="settings-disclosure">Stored only on this device. Sent directly to Anthropic when you use AI features.</p>
          <input id="settings-api-key" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />
          <div class="settings-api-key-actions">
            <button id="settings-api-key-save" type="button">Save</button>
            <button id="settings-api-key-clear" type="button" class="btn-secondary">Clear</button>
          </div>
          <p id="settings-api-key-status" class="settings-api-key-status"></p>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/app.ts"></script>
</body>
</html>
